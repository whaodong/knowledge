spring:
  application:
    name: aiapp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  session:
    store-type: redis
    redis:
      namespace: ${SESSION_REDIS_NAMESPACE:knowledge:session}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        name: ${SESSION_COOKIE_NAME:KNOWLEDGE_SESSION}
        http-only: ${SESSION_COOKIE_HTTP_ONLY:true}
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:Lax}
        path: /

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: INFO
    knowledge.aiapp: INFO

app:
  security:
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,PATCH,OPTIONS}
      allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
  knowledge:
    task:
      stream-key: ${KNOWLEDGE_TASK_STREAM_KEY:knowledge:task:stream}
      group: ${KNOWLEDGE_TASK_GROUP:knowledge-task-group}
      consumer: ${KNOWLEDGE_TASK_CONSUMER:knowledge-task-consumer-1}
      poll-interval-ms: ${KNOWLEDGE_TASK_POLL_INTERVAL_MS:3000}
